<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Copets</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='28' fill='%2300add8'/%3E%3Ccircle cx='24' cy='25' r='6' fill='white'/%3E%3Ccircle cx='40' cy='25' r='6' fill='white'/%3E%3Ccircle cx='24' cy='25' r='2' fill='%23253443'/%3E%3Ccircle cx='40' cy='25' r='2' fill='%23253443'/%3E%3Cellipse cx='32' cy='38' rx='10' ry='7' fill='%23f8d49b'/%3E%3C/svg%3E">
    <style>
      :root {
        color-scheme: light;
        --go-blue: #00add8;
        --go-blue-dark: #007d9c;
        --go-blue-deep: #005f73;
        --ink: #253443;
        --muted: #5f6f7a;
        --line: #dbe7ee;
        --page: #ffffff;
        --band: #f6f8fa;
        --row: #ffffff;
        --sprite-bg: #eef8fb;
        --shadow: 0 1px 2px rgb(0 0 0 / 8%);
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --ink: #f5f5f5;
        --muted: #c7c7c7;
        --line: #2a2a2a;
        --page: #000000;
        --band: #000000;
        --row: #000000;
        --sprite-bg: #101010;
        --shadow: 0 1px 2px rgb(0 0 0 / 40%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--page);
        color: var(--ink);
        font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        border-bottom: 1px solid #0086a8;
        background: var(--go-blue);
        box-shadow: inset 0 -1px 0 rgb(255 255 255 / 22%);
      }

      .topbar,
      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .topbar {
        min-height: 76px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .brand {
        display: flex;
        align-items: center;
        min-width: 0;
      }

      h1 {
        margin: 0;
        color: #ffffff;
        font-size: clamp(1.8rem, 3vw, 2.7rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 4px 0 0;
        color: #e8fbff;
        font-size: 0.98rem;
      }

      .theme-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgb(255 255 255 / 65%);
        border-radius: 50%;
        background: transparent;
        color: #ffffff;
        width: 36px;
        height: 36px;
        padding: 0;
        cursor: pointer;
      }

      .theme-toggle[data-target-theme="dark"] {
        color: #ffffff;
      }

      .theme-toggle[data-target-theme="light"] {
        color: #ffffff;
      }

      .theme-toggle:hover {
        background: rgb(255 255 255 / 14%);
      }

      .theme-toggle svg {
        width: 24px;
        height: 24px;
        display: block;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      main {
        padding: 26px 0 44px;
      }

      .pet-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(max-content, 224px));
        gap: 14px;
      }

      .pet-card {
        display: grid;
        justify-items: center;
        gap: 10px;
        min-height: 180px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: var(--row);
        color: inherit;
        font: inherit;
        text-align: center;
        cursor: pointer;
        box-shadow: var(--shadow);
      }

      .pet-card:hover,
      .pet-card[aria-pressed="true"] {
        border-color: var(--go-blue-dark);
      }

      .pet-card:focus-visible {
        outline: 3px solid rgb(0 173 216 / 35%);
        outline-offset: 2px;
      }

      .pet-card-name {
        margin: 0;
        color: var(--go-blue-dark);
        font-size: 1rem;
        font-weight: 700;
        line-height: 1.35;
        letter-spacing: 0;
        white-space: nowrap;
      }

      :root[data-theme="dark"] .pet-card-name {
        color: #6fdcff;
      }

      .pet-detail {
        display: grid;
        gap: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px 20px;
        background: var(--row);
        box-shadow: var(--shadow);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgb(15 23 42 / 52%);
        backdrop-filter: blur(2px);
      }

      .modal-backdrop[data-open="true"] {
        display: flex;
      }

      .pet-modal {
        width: min(980px, 100%);
        max-height: min(860px, calc(100vh - 48px));
        overflow: visible;
        position: relative;
        filter: drop-shadow(0 28px 45px rgb(0 0 0 / 28%));
        transform: translateY(-18px);
      }

      .pet-modal .pet-detail {
        max-height: min(800px, calc(100vh - 72px));
        overflow: auto;
        padding: 24px 24px 22px;
        border-color: rgb(255 255 255 / 80%);
        box-shadow:
          0 24px 70px rgb(0 0 0 / 32%),
          0 3px 10px rgb(0 0 0 / 18%);
      }

      .modal-close {
        position: absolute;
        top: -15px;
        right: -15px;
        z-index: 1;
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 50%;
        background: var(--row);
        color: var(--ink);
        cursor: pointer;
        box-shadow: 0 8px 24px rgb(0 0 0 / 24%);
      }

      .modal-close:hover {
        border-color: var(--go-blue-dark);
        color: var(--go-blue-dark);
      }

      .modal-close svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
      }

      .pet-copy {
        min-width: 0;
      }

      .pet-header {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 16px;
      }

      .pet-text {
        min-width: 0;
      }

      .pet-name {
        margin: 0 0 8px;
        color: var(--go-blue-dark);
        font-size: 1.22rem;
        line-height: 1.25;
        letter-spacing: 0;
      }

      :root[data-theme="dark"] .pet-name {
        color: #6fdcff;
      }

      .pet-description {
        margin: 0;
        color: var(--muted);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .pet-detail .pet-description {
        display: block;
        max-width: 84ch;
        overflow: visible;
        overflow-wrap: anywhere;
        white-space: normal;
        word-break: break-word;
      }

      .install-button {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 36px;
        border: 1px solid var(--go-blue-dark);
        border-radius: 6px;
        padding: 0 12px;
        background: var(--go-blue);
        color: #ffffff;
        text-decoration: none;
        font-size: 0.92rem;
        font-weight: 600;
        white-space: nowrap;
        box-shadow: 0 1px 0 rgb(0 0 0 / 8%);
      }

      .install-button:hover {
        background: var(--go-blue-dark);
      }

      .install-button svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(112px, 1fr));
        gap: 12px;
        align-items: stretch;
      }

      .action {
        min-width: 0;
        display: grid;
        justify-items: center;
        gap: 6px;
      }

      .sprite-stage {
        width: 112px;
        height: 122px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--sprite-bg);
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .sprite {
        --frame-w: 96px;
        --frame-h: 104px;
        width: var(--frame-w);
        height: var(--frame-h);
        background-image: var(--sheet);
        background-repeat: no-repeat;
        background-size: 768px 936px;
        background-position-y: calc(-1 * var(--row-index) * var(--frame-h));
        image-rendering: auto;
      }

      .action-name {
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.2;
      }

      @media (max-width: 900px) {
        .actions {
          grid-template-columns: repeat(auto-fit, minmax(104px, 1fr));
        }
      }

      @media (max-width: 560px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
          padding: 16px 0;
        }

        .theme-toggle {
          width: 36px;
          justify-content: center;
        }

        main {
          width: min(100% - 20px, 1180px);
          padding-top: 16px;
        }

        .pet-list {
          grid-template-columns: 1fr;
          gap: 10px;
        }

        .pet-card {
          min-height: 162px;
          padding: 10px;
        }

        .pet-card-name {
          font-size: 0.92rem;
        }

        .pet-detail {
          padding: 16px 12px;
        }

        .pet-modal .pet-detail {
          padding: 18px 12px 14px;
        }

        .pet-description {
          -webkit-line-clamp: 3;
        }

        .pet-header {
          flex-direction: column;
          gap: 12px;
        }

        .install-button {
          align-self: flex-start;
        }

        .actions {
          grid-template-columns: repeat(auto-fit, minmax(104px, 1fr));
        }

        .sprite-stage {
          width: 104px;
          height: 114px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="topbar">
        <div class="brand">
          <div>
            <h1>Copets</h1>
            <p class="subtitle">Codex pets collection</p>
          </div>
        </div>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换为黑色背景"></button>
      </div>
    </header>

    <main>
      <section class="pet-list" aria-label="宠物列表"></section>
    </main>

    <div class="modal-backdrop" data-pet-modal hidden>
      <section class="pet-modal" role="dialog" aria-modal="true" aria-labelledby="pet-modal-title">
        <button class="modal-close" type="button" data-modal-close aria-label="关闭宠物详情">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
        <div data-modal-content></div>
      </section>
    </div>

    <script>
      const actions = [
        { label: "idle", row: 0, durations: [280, 110, 110, 140, 140, 320] },
        { label: "running-right", row: 1, durations: [120, 120, 120, 120, 120, 120, 120, 220] },
        { label: "running-left", row: 2, durations: [120, 120, 120, 120, 120, 120, 120, 220] },
        { label: "waving", row: 3, durations: [140, 140, 140, 280] },
        { label: "jumping", row: 4, durations: [140, 140, 140, 140, 280] },
        { label: "failed", row: 5, durations: [140, 140, 140, 140, 140, 140, 140, 240] },
        { label: "waiting", row: 6, durations: [150, 150, 150, 150, 150, 260] },
        { label: "running", row: 7, durations: [120, 120, 120, 120, 120, 220] },
        { label: "review", row: 8, durations: [150, 150, 150, 150, 150, 280] }
      ];

      const petList = document.querySelector(".pet-list");
      const petModal = document.querySelector("[data-pet-modal]");
      const modalContent = document.querySelector("[data-modal-content]");
      const modalClose = document.querySelector("[data-modal-close]");
      const installIcon = `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3v12"></path>
          <path d="m7 10 5 5 5-5"></path>
          <path d="M5 21h14"></path>
        </svg>`;
      const installPrompt = (pet) => `Please help me install the Codex pet "${pet.displayName}" from this GitHub folder: ${pet.githubUrl}`;
      const installLink = (pet) => `codex://threads/new?prompt=${encodeURIComponent(installPrompt(pet))}`;
      const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (character) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[character]));
      let selectedPetId = "";
      let animationRunId = 0;

      function renderPetCard(pet) {
        const isSelected = pet.id === selectedPetId;

        return `
          <button class="pet-card" type="button" data-pet-id="${escapeHtml(pet.id)}" aria-pressed="${isSelected}">
            <span class="pet-card-name">${escapeHtml(pet.displayName)}</span>
            <span class="sprite-stage" aria-hidden="true">
              <span
                class="sprite"
                data-cycle-actions="true"
                data-durations="${actions[0].durations.join(",")}"
                style="--sheet: url('${escapeHtml(pet.spritesheetPath)}'); --row-index: 0;"
              ></span>
            </span>
          </button>
        `;
      }

      function renderPetDetail(pet) {
        return `
          <article class="pet-detail" id="pet-detail-${escapeHtml(pet.id)}">
            <div class="pet-copy">
              <div class="pet-header">
                <div class="pet-text">
                  <h2 class="pet-name" id="pet-modal-title">${escapeHtml(pet.displayName)}</h2>
                  <p class="pet-description">${escapeHtml(pet.description)}</p>
                </div>
                <a class="install-button" href="${escapeHtml(installLink(pet))}" aria-label="Install ${escapeHtml(pet.displayName)} in Codex">
                  ${installIcon}
                  <span>Install</span>
                </a>
              </div>
            </div>
            <div class="actions" aria-label="${escapeHtml(pet.displayName)} 动作">
              ${actions.map((action) => `
                <div class="action">
                  <div class="sprite-stage">
                    <div
                      class="sprite"
                      role="img"
                      aria-label="${escapeHtml(pet.displayName)} ${escapeHtml(action.label)}动画"
                      data-durations="${action.durations.join(",")}"
                      style="--sheet: url('${escapeHtml(pet.spritesheetPath)}'); --row-index: ${action.row};"
                    ></div>
                  </div>
                  <span class="action-name">${escapeHtml(action.label)}</span>
                </div>
              `).join("")}
            </div>
          </article>
        `;
      }

      function renderPets(pets) {
        petList.innerHTML = pets.map(renderPetCard).join("");

        petList.querySelectorAll(".pet-card").forEach((card) => {
          card.addEventListener("click", () => {
            const pet = pets.find((candidate) => candidate.id === card.dataset.petId);
            if (pet) {
              openPetModal(pet);
            }
          });
        });
      }

      function updateSelectedCard() {
        petList.querySelectorAll(".pet-card").forEach((card) => {
          card.setAttribute("aria-pressed", String(card.dataset.petId === selectedPetId));
        });
      }

      function openPetModal(pet) {
        selectedPetId = pet.id;
        modalContent.innerHTML = renderPetDetail(pet);
        petModal.hidden = false;
        petModal.dataset.open = "true";
        document.body.style.overflow = "hidden";
        updateSelectedCard();
        startSpriteAnimations();
        modalClose.focus();
      }

      function closePetModal() {
        if (petModal.hidden) {
          return;
        }

        selectedPetId = "";
        petModal.hidden = true;
        delete petModal.dataset.open;
        modalContent.innerHTML = "";
        document.body.style.overflow = "";
        updateSelectedCard();
        startSpriteAnimations();
      }

      function startSpriteAnimations() {
        animationRunId += 1;
        const currentRunId = animationRunId;

        document.querySelectorAll(".sprite").forEach((sprite) => {
          let actionIndex = 0;
          let frame = 0;

          const showNextFrame = () => {
            if (!sprite.isConnected || currentRunId !== animationRunId) {
              return;
            }

            const isCycleSprite = sprite.dataset.cycleActions === "true";
            const action = isCycleSprite ? actions[actionIndex] : null;
            const durations = isCycleSprite
              ? action.durations
              : sprite.dataset.durations.split(",").map(Number);

            if (isCycleSprite) {
              sprite.style.setProperty("--row-index", action.row);
            }

            sprite.style.backgroundPositionX = `calc(-1 * var(--frame-w) * ${frame})`;
            const delay = durations[frame];
            frame = (frame + 1) % durations.length;

            if (isCycleSprite && frame === 0) {
              actionIndex = (actionIndex + 1) % actions.length;
            }

            window.setTimeout(showNextFrame, delay);
          };

          showNextFrame();
        });
      }

      async function loadPets() {
        const response = await fetch("pets.json");

        if (!response.ok) {
          throw new Error(`Failed to load pets.json: ${response.status}`);
        }

        return response.json();
      }

      const root = document.documentElement;
      const themeToggle = document.querySelector("[data-theme-toggle]");
      const savedTheme = localStorage.getItem("copets-theme");
      const sunIcon = `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="m4.93 4.93 1.41 1.41"></path>
          <path d="m17.66 17.66 1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="m6.34 17.66-1.41 1.41"></path>
          <path d="m19.07 4.93-1.41 1.41"></path>
        </svg>`;
      const moonIcon = `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20.5 14.4A8 8 0 0 1 9.6 3.5a8.6 8.6 0 1 0 10.9 10.9Z"></path>
        </svg>`;

      function updateThemeToggle() {
        const isDark = root.dataset.theme === "dark";
        themeToggle.innerHTML = isDark ? moonIcon : sunIcon;
        themeToggle.setAttribute("aria-label", isDark ? "切换为白色背景" : "切换为黑色背景");
        themeToggle.setAttribute("title", isDark ? "切换为白色背景" : "切换为黑色背景");
        themeToggle.dataset.targetTheme = isDark ? "light" : "dark";
        themeToggle.setAttribute("aria-pressed", String(isDark));
      }

      if (savedTheme === "dark") {
        root.dataset.theme = "dark";
      }

      themeToggle.addEventListener("click", () => {
        const nextTheme = root.dataset.theme === "dark" ? "light" : "dark";
        if (nextTheme === "dark") {
          root.dataset.theme = "dark";
        } else {
          delete root.dataset.theme;
        }
        try {
          localStorage.setItem("copets-theme", nextTheme);
        } catch (_) {}
        updateThemeToggle();
      });

      modalClose.addEventListener("click", closePetModal);

      petModal.addEventListener("click", (event) => {
        if (event.target === petModal) {
          closePetModal();
        }
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closePetModal();
        }
      });

      updateThemeToggle();

      loadPets()
        .then((pets) => {
          renderPets(pets);
          startSpriteAnimations();
        })
        .catch((error) => {
          petList.innerHTML = `<p class="pet-description">${escapeHtml(error.message)}</p>`;
        });
    </script>
  </body>
</html>
